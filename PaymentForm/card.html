<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Payment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page-wrapper">
    <div class="card">

      <a href="payment.html" class="back-link">← Back to payment methods</a>

      <h1 class="page-title">Card Payment</h1>
      <p class="page-sub">Enter your card details to complete payment.</p>

      <form onsubmit="handleCardPayment(event)">

        <div class="form-group">
          <label for="card-name">Cardholder Name</label>
          <input type="text" id="card-name" name="cardname" placeholder="e.g. Paul Biya" required>
        </div>

        <div class="form-group">
          <label for="card-number">Card Number</label>
          <input type="text" id="card-number" name="cardnumber" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCard(this)" required>
        </div>

        <div class="form-group">
          <label for="card-amount">Amount (XAF)</label>
          <input type="number" id="card-amount" name="amount" placeholder="e.g. 5000" min="100" required>
        </div>

        <div style="display: flex; gap: 14px;">
          <div class="form-group" style="flex: 1;">
            <label for="card-expiry">Expiry Date</label>
            <input type="text" id="card-expiry" name="expiry" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)" required>
          </div>

          <div class="form-group" style="flex: 1;">
            <label for="card-cvv">CVV</label>
            <input type="password" id="card-cvv" name="cvv" placeholder="123" maxlength="4" required>
          </div>
        </div>

        <button type="submit" class="btn-submit">Pay Now</button>

      </form>

      <p class="notice">Your card details are used only to initiate this transaction. They are not stored.</p>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
