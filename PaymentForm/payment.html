<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page-wrapper">
    <div class="card">
      <h1 class="page-title">How would you like to pay?</h1>
      <p class="page-sub">Choose a payment method below to continue.</p>

      <div class="method-list">

        <a href="mobile-money.html" class="method-btn momo">
          <span class="method-icon">📱</span>
          <span class="method-label">Mobile Money</span>
          <span class="method-arrow">→</span>
        </a>

        <a href="paypal.html" class="method-btn paypal">
          <span class="method-icon">🅿️</span>
          <span class="method-label">PayPal</span>
          <span class="method-arrow">→</span>
        </a>

        <a href="card.html" class="method-btn card">
          <span class="method-icon">💳</span>
          <span class="method-label">Credit / Debit Card</span>
          <span class="method-arrow">→</span>
        </a>

      </div>
    </div>
  </main>

</body>
</html>
